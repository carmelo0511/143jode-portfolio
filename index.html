<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Works — 143jode." />
  <title>Works — 143jode</title>
  <link rel="icon" href="icon.svg" />

  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
  />
  <link rel="stylesheet" href="styles.css?v=40" />
  <link rel="stylesheet" href="grid.css?v=21" />

  <!-- Three.js for the live 3D logo in the header (logo3d.js) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script>
    /* Intro gate — show the counting-number loader on the FIRST load of the
       session and on RELOADS; skip it on internal navigations (those keep the
       cross-document View Transition). Runs before <body> paints so the white
       overlay covers instantly with no flash, and only ADDS the class, so JS-off
       users are never trapped behind it. Also sets introSeen so navigating INTO
       the focus view (work.html) keeps its View Transition. */
    (function () {
      try {
        var e = (performance.getEntriesByType && performance.getEntriesByType("navigation")[0]) || null;
        var type = e ? e.type
          : (performance.navigation ? ["navigate", "reload", "back_forward"][performance.navigation.type] : "navigate");
        var seen = false;
        try { seen = !!sessionStorage.getItem("introSeen"); sessionStorage.setItem("introSeen", "1"); } catch (_) {}
        if (type === "reload" || !seen) document.documentElement.classList.add("intro-run");
      } catch (_) {}
    })();
  </script>
</head>
<body class="works-grid">
  <!-- intro preloader: number climbs 0→100 while the right bar fills upward, then
       the overlay crossfades out and the page settles in. Visible only when the
       <head> gate added html.intro-run (first load of the session + reloads). -->
  <div class="intro" id="intro" aria-hidden="true">
    <span class="intro__count" id="introCount">0</span>
    <i class="intro__bar" id="introBar"></i>
  </div>

  <header class="work-head">
    <nav class="topnav" aria-label="Primary">
      <span class="logo3d" id="logo3d" aria-hidden="true"></span>
      <a href="index.html" class="is-active" aria-current="page">Works,</a>
      <a href="about.html">About,</a>
      <a href="mailto:hello@143jode.com">Contact</a>
    </nav>
  </header>

  <main class="grid-main">
    <!-- centre project-name list: sticky in the viewport, highlights whichever
         project band is currently centred; each name is a shared element that
         morphs to/from About's "Selected Works" and the focus view's list -->
    <div class="grid-list-wrap" aria-hidden="true">
      <ul class="work-list" id="gridList"></ul>
      <span class="work-list__marker" id="gridMarker">&#9664;</span>
    </div>

    <!-- one BAND per project: its number + a spread of its thumbnails, left and
         right of the centre list. grid.js fills this from the project data. -->
    <div class="grid-bands" id="gridBands"></div>

    <p class="grid-author">143jode</p>
  </main>

  <script src="content.js?v=1"></script>
  <script src="apply-content.js?v=6"></script>
  <script src="intro.js?v=7"></script>
  <script src="grid.js?v=23"></script>
  <script type="module" src="logo3d.js?v=19"></script>
</body>
</html>
